<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catogary</title>
    <link rel="stylesheet" href="./src/global.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
    <script type="module">
    import { createIcons, icons } from 'lucide';
    createIcons({ icons });
  </script>
</head>
<body>
    <div class="relative flex items-center justify-center w-full lg:h-9.5 h-[34px] bg-black text-white text-[12px] md:text-[14px]">
    <div class="flex justify-center items-center w-full">
      <p>Sign up and get 20% off to your first order.</p>
      <a href="" class="ml-1 lg:ml-2 underline font-semibold">Sign Up Now</a>
    </div>
    <div class="absolute right-4 lg:right-15 hidden lg:block">
      <i data-lucide="x" class="text-white cursor-pointer w-6 h-6"></i>
    </div>
  </div>
<div class="flex items-center justify-between w-full px-4 lg:px-20 h-14 lg:h-24">
    <div class="flex items-center gap-4">
      <i data-lucide="menu" class="lg:hidden cursor-pointer mt-1 w-6 h-6"></i>
      <div class="logo text-[25px] lg:text-[32px] mt-1.5"><a href="/">
          <h1>SHOP.CO</h1>
        </a></div>
    </div>

    <div class="hidden lg:flex gap-8 items-center text-[16px]">
      <div class="flex items-center gap-1 cursor-pointer">
        <p>Shop</p><i data-lucide="chevron-down" class="w-4 h-4 mt-0.5"></i>
      </div>
      <a href="" class="cursor-pointer">
        <p>On Sale</p>
      </a>
      <a href="" class="cursor-pointer">
        <p>New Arrivals</p>
      </a>
      <a href="" class="cursor-pointer">
        <p>Brands</p>
      </a>
    </div>

    <div class="flex items-center gap-4 lg:gap-6">
      <div class="relative hidden lg:block">
        <i data-lucide="search" class="absolute text-gray-400 left-4 top-1/2 -translate-y-1/2 w-5 h-5"></i>
        <input type="text" placeholder="search the product..."
          class="w-140 pl-12 pr-4 h-12 bg-gray-100 rounded-full text-[16px] outline-none">
      </div>
      <i data-lucide="search" class="lg:hidden cursor-pointer w-6 h-6 mt-1"></i>
      <i data-lucide="shopping-cart" class="cursor-pointer w-6 h-6 mt-1"></i>
      <i data-lucide="circle-user-round" class="cursor-pointer w-6 h-6 mt-1"></i>
    </div>
  </div>
  <div class="flex ml-4 lg:ml-20">
    <p>Home</p><i data-lucide="chevron-right"></i><p>Casual</p>
  </div>
  <div class="flex lg:ml-20">
  <div class="flex flex-col rounded-4xl border p-[20px] border-gray-400 mt-[24px] w-[295px] h-[1220px] hidden lg:block">
    <div class="flex justify-between"><h1 class="font-black text-[20px]">Filters</h1><i data-lucide="sliders-vertical" class="mt-1 text-gray-400"></i></div>
    <hr class="mt-3">
  </div></div>
</body>
</html>
